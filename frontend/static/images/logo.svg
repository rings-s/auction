<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="70" height="70">
  <!-- Definitions for advanced effects -->
  <defs>
    <!-- Primary gradient with multiple color stops for depth -->
    <linearGradient id="advancedGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A3A99"/>
      <stop offset="40%" stop-color="#3B4CCA"/>
      <stop offset="100%" stop-color="#5D6EEC"/>
    </linearGradient>

    <!-- Secondary accent gradient -->
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9800"/>
      <stop offset="100%" stop-color="#FFB74D"/>
    </linearGradient>

    <!-- Subtle glow effect -->
    <filter id="sophisticatedGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Clip path for complex shape cutting -->
    <clipPath id="complexCut">
      <path d="M120,40 L170,90 L120,140 L70,90 Z"/>
    </clipPath>
  </defs>

  <!-- Main abstract logo composition -->
  <g transform="translate(120, 120)">
    <!-- Base abstract shape - represents rising bids/auction dynamism -->
    <path d="M-60,-60
             C-30,-90 30,-90 60,-60
             L60,0
             C40,10 40,40 20,50
             C0,60 -20,60 -40,50
             C-60,40 -60,10 -60,0 Z"
          fill="url(#advancedGradient)"
          stroke="#FFFFFF"
          stroke-width="1.5"
          stroke-linejoin="round"
          filter="url(#sophisticatedGlow)"/>

    <!-- Central geometric element - subtly suggests house/property -->
    <path d="M-30,-20 L0,-50 L30,-20 L30,20 L-30,20 Z"
          fill="#141B2D"
          stroke="#FFFFFF"
          stroke-width="0.5"
          stroke-opacity="0.6"/>

    <!-- Dynamic ascending lines representing bid increments -->
    <g stroke="#FFFFFF" stroke-width="1.5" stroke-linecap="round" stroke-opacity="0.8">
      <line x1="-40" y1="30" x2="-25" y2="20" />
      <line x1="-20" y1="35" x2="-5" y2="25" />
      <line x1="0" y1="40" x2="15" y2="30" />
      <line x1="20" y1="45" x2="35" y2="35" />
    </g>

    <!-- Abstract gavel/strike point -->
    <circle cx="0" cy="-10" r="8"
            fill="url(#accentGradient)"
            stroke="#FFFFFF"
            stroke-width="1"/>

    <!-- Overlapping semi-transparent shapes for depth -->
    <path d="M-20,0 C-10,-20 10,-20 20,0 C10,20 -10,20 -20,0 Z"
          fill="#FF9800"
          fill-opacity="0.2"
          transform="rotate(45)"/>

    <!-- Sophisticated accent elements -->
    <circle cx="35" cy="-35" r="5" fill="#FF9800" fill-opacity="0.7"/>

    <!-- Negative space cutout for visual interest -->
    <path d="M-15,10 C-5,5 5,5 15,10 C5,15 -5,15 -15,10 Z"
          fill="#141B2D"/>
  </g>
</svg>
